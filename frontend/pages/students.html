<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Hostel Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/tables.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="app-container">
        <nav class="navbar" id="navbar"></nav>

        <div class="main-content">
            <aside class="sidebar" id="sidebar"></aside>

            <div class="content">
                <div class="page-container">
                    <div class="page-header">
                        <h1>👨‍🎓 Students Management</h1>
                        <button class="btn-primary" id="toggleFormBtn" onclick="toggleStudentForm()">
                            ➕ Add Student
                        </button>
                    </div>

                    <!-- Add/Edit Form -->
                    <div id="studentForm" class="form-container" style="display: none;">
                        <form id="studentFormElement">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="studentName">Name</label>
                                    <input type="text" id="studentName" name="name" required>
                                </div>
                                <div class="form-group">
                                    <label for="studentDOB">Date of Birth</label>
                                    <input type="date" id="studentDOB" name="dob">
                                </div>
                                <div class="form-group">
                                    <label for="studentGender">Gender</label>
                                    <select id="studentGender" name="gender">
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="studentPhone">Phone</label>
                                    <input type="tel" id="studentPhone" name="phone" required>
                                </div>
                                <div class="form-group">
                                    <label for="studentParentPhone">Parent's Phone</label>
                                    <input type="tel" id="studentParentPhone" name="parent_number">
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn-success">Save Student</button>
                                <button type="button" class="btn-cancel" onclick="cancelStudentForm()">Cancel</button>
                            </div>
                        </form>
                    </div>

                    <!-- Students Table -->
                    <div class="table-container">
                        <table class="table" id="studentsTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Gender</th>
                                    <th>DOB</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="studentsTbody">
                                <tr><td colspan="6" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/app.js"></script>
    <script>
        const Students = {
            students: [],

            async init() {
                Auth.checkAuth();
                await initializeApp();
                await this.loadStudents();
                this.setupEventListeners();
            },

            async loadStudents() {
                try {
                    const result = await apiCall('/students/');
                    this.students = result.data || [];
                    this.renderStudents();
                } catch (error) {
                    Utils.showError('Failed to load students: ' + error.message);
                    document.getElementById('studentsTbody').innerHTML = 
                        '<tr><td colspan="6">Error loading data</td></tr>';
                }
            },

            renderStudents() {
                const html = this.students.map(s => `
                    <tr>
                        <td>${s.student_id}</td>
                        <td>${s.name}</td>
                        <td>${s.phone}</td>
                        <td>${s.gender || '-'}</td>
                        <td>${Utils.formatDate(s.dob)}</td>
                        <td>
                            <button class="btn-edit" onclick="Students.editStudent(${s.student_id})">✏️ Edit</button>
                            <button class="btn-delete" onclick="Students.deleteStudent(${s.student_id})">🗑️ Delete</button>
                        </td>
                    </tr>
                `).join('');

                document.getElementById('studentsTbody').innerHTML = html || 
                    '<tr><td colspan="6" class="text-center">No students found</td></tr>';
            },

            async saveStudent(e) {
                e.preventDefault();
                const name = document.getElementById('studentName').value;
                const phone = document.getElementById('studentPhone').value;
                const dob = document.getElementById('studentDOB').value;
                const gender = document.getElementById('studentGender').value;
                const parent_number = document.getElementById('studentParentPhone').value;

                try {
                    Utils.showLoading();
                    const result = await apiCall('/students/', 'POST', {
                        name, phone, dob, gender, parent_number
                    });
                    Utils.hideLoading();
                    Utils.showSuccess('Student added successfully!');
                    this.cancelForm();
                    await this.loadStudents();
                } catch (error) {
                    Utils.hideLoading();
                    Utils.showError('Failed to add student: ' + error.message);
                }
            },

            editStudent(id) {
                const student = this.students.find(s => s.student_id === id);
                if (!student) return;
                
                document.getElementById('studentName').value = student.name;
                document.getElementById('studentPhone').value = student.phone;
                document.getElementById('studentDOB').value = student.dob || '';
                document.getElementById('studentGender').value = student.gender || '';
                document.getElementById('studentParentPhone').value = student.parent_number || '';
                document.getElementById('studentForm').style.display = 'block';
            },

            async deleteStudent(id) {
                if (!confirm('Are you sure you want to delete this student?')) return;
                
                try {
                    Utils.showLoading();
                    await apiCall(`/students/${id}`, 'DELETE');
                    Utils.hideLoading();
                    Utils.showSuccess('Student deleted successfully!');
                    await this.loadStudents();
                } catch (error) {
                    Utils.hideLoading();
                    Utils.showError('Failed to delete student: ' + error.message);
                }
            },

            toggleForm() {
                const form = document.getElementById('studentForm');
                form.style.display = form.style.display === 'none' ? 'block' : 'none';
                if (form.style.display === 'none') {
                    document.getElementById('studentFormElement').reset();
                }
            },

            cancelForm() {
                document.getElementById('studentForm').style.display = 'none';
                document.getElementById('studentFormElement').reset();
            },

            setupEventListeners() {
                document.getElementById('studentFormElement').addEventListener('submit', (e) => this.saveStudent(e));
            }
        };

        // Window functions for onclick handlers
        function toggleStudentForm() {
            Students.toggleForm();
        }

        function cancelStudentForm() {
            Students.cancelForm();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => Students.init());
    </script>

            await loadStudents();
        });

        document.getElementById('studentFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            await saveStudent();
        });
    </script>
</body>
</html>
