<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms - Hostel Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/tables.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="app-container">
        <nav class="navbar" id="navbar"></nav>

        <div class="main-content">
            <aside class="sidebar" id="sidebar"></aside>

            <div class="content">
                <div class="page-container">
                    <div class="page-header">
                        <h1>🛏️ Rooms Management</h1>
                        <button class="btn-primary" id="toggleFormBtn" onclick="toggleRoomForm()">
                            ➕ Add Room
                        </button>
                    </div>

                    <!-- Add/Edit Form -->
                    <div id="roomForm" class="form-container" style="display: none;">
                        <form id="roomFormElement">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="roomBlock">Block</label>
                                    <select id="roomBlock" name="block_id" required>
                                        <option value="">Select Block</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="roomNumber">Room Number</label>
                                    <input type="text" id="roomNumber" name="room_number" required>
                                </div>
                                <div class="form-group">
                                    <label for="roomType">Room Type</label>
                                    <select id="roomType" name="room_type" required>
                                        <option value="">Select Type</option>
                                        <option value="Single">Single</option>
                                        <option value="Double">Double</option>
                                        <option value="Triple">Triple</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="roomCapacity">Capacity</label>
                                    <input type="number" id="roomCapacity" name="capacity" required>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn-success">Save Room</button>
                                <button type="button" class="btn-cancel" onclick="cancelRoomForm()">Cancel</button>
                            </div>
                        </form>
                    </div>

                    <!-- Rooms Table -->
                    <div class="table-container">
                        <table class="table" id="roomsTable">
                            <thead>
                                <tr>
                                    <th>Room #</th>
                                    <th>Block</th>
                                    <th>Type</th>
                                    <th>Capacity</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="roomsTbody">
                                <tr><td colspan="6" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/app.js"></script>
    <script>
        const Rooms = {
            rooms: [],
            blocks: [],

            async init() {
                Auth.checkAuth();
                await initializeApp();
                await this.loadBlocks();
                await this.loadRooms();
                this.setupEventListeners();
            },

            async loadBlocks() {
                try {
                    const result = await apiCall('/blocks/');
                    this.blocks = result.data || [];
                    const selector = document.getElementById('roomBlock');
                    this.blocks.forEach(block => {
                        const option = document.createElement('option');
                        option.value = block.block_id;
                        option.textContent = block.block_name;
                        selector.appendChild(option);
                    });
                } catch (error) {
                    Utils.showError('Failed to load blocks: ' + error.message);
                }
            },

            async loadRooms() {
                try {
                    const result = await apiCall('/rooms/');
                    this.rooms = result.data || [];
                    this.renderRooms();
                } catch (error) {
                    Utils.showError('Failed to load rooms: ' + error.message);
                    document.getElementById('roomsTbody').innerHTML = 
                        '<tr><td colspan="6">Error loading data</td></tr>';
                }
            },

            renderRooms() {
                const html = this.rooms.map(r => `
                    <tr>
                        <td>${r.room_number}</td>
                        <td>${r.block_name}</td>
                        <td>${r.room_type}</td>
                        <td>${r.capacity}</td>
                        <td><span class="badge badge-${r.status.toLowerCase()}">${r.status}</span></td>
                        <td>
                            <button class="btn-edit" onclick="Rooms.editRoom(${r.room_id})">✏️ Edit</button>
                            <button class="btn-delete" onclick="Rooms.deleteRoom(${r.room_id})">🗑️ Delete</button>
                        </td>
                    </tr>
                `).join('');

                document.getElementById('roomsTbody').innerHTML = html || 
                    '<tr><td colspan="6" class="text-center">No rooms found</td></tr>';
            },

            async saveRoom(e) {
                e.preventDefault();
                const block_id = document.getElementById('roomBlock').value;
                const room_number = document.getElementById('roomNumber').value;
                const room_type = document.getElementById('roomType').value;
                const capacity = document.getElementById('roomCapacity').value;

                try {
                    Utils.showLoading();
                    const result = await apiCall('/rooms/', 'POST', {
                        block_id, room_number, room_type, capacity
                    });
                    Utils.hideLoading();
                    Utils.showSuccess('Room added successfully!');
                    this.cancelForm();
                    await this.loadRooms();
                } catch (error) {
                    Utils.hideLoading();
                    Utils.showError('Failed to add room: ' + error.message);
                }
            },

            editRoom(id) {
                const room = this.rooms.find(r => r.room_id === id);
                if (!room) return;
                
                document.getElementById('roomBlock').value = room.block_id;
                document.getElementById('roomNumber').value = room.room_number;
                document.getElementById('roomType').value = room.room_type;
                document.getElementById('roomCapacity').value = room.capacity;
                document.getElementById('roomForm').style.display = 'block';
            },

            async deleteRoom(id) {
                if (!confirm('Are you sure you want to delete this room?')) return;
                
                try {
                    Utils.showLoading();
                    await apiCall(`/rooms/${id}`, 'DELETE');
                    Utils.hideLoading();
                    Utils.showSuccess('Room deleted successfully!');
                    await this.loadRooms();
                } catch (error) {
                    Utils.hideLoading();
                    Utils.showError('Failed to delete room: ' + error.message);
                }
            },

            toggleForm() {
                const form = document.getElementById('roomForm');
                form.style.display = form.style.display === 'none' ? 'block' : 'none';
                if (form.style.display === 'none') {
                    document.getElementById('roomFormElement').reset();
                }
            },

            cancelForm() {
                document.getElementById('roomForm').style.display = 'none';
                document.getElementById('roomFormElement').reset();
            },

            setupEventListeners() {
                document.getElementById('roomFormElement').addEventListener('submit', (e) => this.saveRoom(e));
            }
        };

        // Window functions for onclick handlers
        function toggleRoomForm() {
            Rooms.toggleForm();
        }

        function cancelRoomForm() {
            Rooms.cancelForm();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => Rooms.init());
    </script>

            e.preventDefault();
            await saveRoom();
        });
    </script>
</body>
</html>
